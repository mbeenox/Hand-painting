<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypnotic Hand</title>
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      body { background: #f6f1e7; font-family: 'Georgia', serif; }

      /* Polish (Feature #2): processing spinner + soft reveal. */
      @keyframes hh-spin { to { transform: rotate(360deg); } }
      @keyframes hh-fade-in { from { opacity: 0; } to { opacity: 1; } }
      .hh-spin { animation: hh-spin 1s linear infinite; transform-origin: 50% 50%; }
      .hh-fade-in { animation: hh-fade-in 900ms ease-out both; }
      @media (prefers-reduced-motion: reduce) {
        .hh-spin { animation-duration: 2.6s; }
        .hh-fade-in { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
